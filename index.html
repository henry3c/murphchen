<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Murph Chen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    :root{
      --bg:#0b0f14;
      --text:#c8d6e5; /* 主文字颜色 */
      --accent:#5fbeff;
      --cursor:var(--text); /* 光标颜色 = 主文字颜色（核心修改） */
      --comment: #62727d;
      font-size:18px;
    }
    html,body{height:100%;}
    body{
      margin:0;
      background: linear-gradient(135deg,#051421 0%,var(--bg) 100%);
      color:var(--text);
      font-family: "JetBrains Mono", monospace;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:1.5rem;
      box-sizing:border-box;
    }

    .terminal {
      width:100%;
      max-width:480px;
      background:#0e141b;
      border-radius:8px;
      box-shadow: 0 12px 36px rgba(1,6,12,0.8);
      border:1px solid rgba(70,130,180,0.15);
      overflow: hidden;
    }

    .term-head{
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      background:#0f1720;
    }
    .dot{width:10px;height:10px;border-radius:50%;}
    .dot.red{background:#ff5f56}
    .dot.yellow{background:#ffbd2e}
    .dot.green{background:#27c93f}
    .filename{margin-left:auto;color:var(--comment);font-size:0.85rem;}

    .term-body{padding:18px 22px 8px;}
    .line{line-height:1.6;white-space:pre;}
    .prompt{color: var(--text); font-weight: 500;}
    
    .YouTube {color: #FF0000;}
    .bilibili {color: #FB7299;}
    .X {color: #1DA1F2;}
    .click-text {color: var(--text);}

    .typing {
      display:inline-block;
      border-right:2px solid var(--cursor);
      animation:blink 1s steps(2,end) infinite;
    }
    @keyframes blink{50%{border-color:transparent}}

    .platform-link {
      text-decoration: none;
      padding:2px 4px;
      font-weight:500;
    }
    .platform-link:hover {background:rgba(255,255,255,0.1)}

    .link-grid {
      margin-top:16px;
      display: grid;
      grid-template-columns: 10ch 1fr; 
      gap: 8px 0;
      align-items: start;
    }
    .grid-prompt {
      color: var(--text);
      font-weight:500;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div class="terminal">
  <div class="term-head">
    <div class="dot red"></div>
    <div class="dot yellow"></div>
    <div class="dot green"></div>
    <div class="filename">murphchen_profile.txt</div>
  </div>

  <div class="term-body">
    <div class="line"><span class="prompt">//:</span><span id="typed-1"></span></div>
    <div class="line"><span class="prompt">//:</span><span id="typed-2"></span><span id="typed-3" class="typing"></span></div>
    
    <div class="link-grid">
      <div class="grid-prompt">//: <span class="click-text">Click</span></div>
      <div><a href="https://www.youtube.com/@murphchen" class="platform-link YouTube">YouTube</a></div>
      
      <div class="grid-prompt">//: <span class="click-text">Click</span></div>
      <div><a href="https://space.bilibili.com/14014217" class="platform-link bilibili">bilibili</a></div>
      
      <div class="grid-prompt">//: <span class="click-text">Click</span></div>
      <div><a href="https://x.com/murphchenonx" class="platform-link X">X</a></div>
    </div>
  </div>
</div>

<script>
    const nameLine = ' I\'m Murph Chen';
    const followPrefix = ' Follow Me On ';
    const platforms = [
      {name:'YouTube', color:'YouTube', delay:2000},
      {name:'bilibili', color:'bilibili', delay:2000},
      {name:'X', color:'X', delay:2000}
    ];

    const TYPING_SPEED = 55;
    const DEL_SPEED = 35;

    const elName = document.getElementById('typed-1');
    const elFollow = document.getElementById('typed-2');
    const elPlatform = document.getElementById('typed-3');

    const wait = ms => new Promise(r => setTimeout(r, ms));

    async function typeOnce(el, text, speed=TYPING_SPEED){
      el.textContent = '';
      for (let i=0;i<text.length;i++){
        el.textContent += text[i];
        await wait(speed);
      }
    }

    async function cyclePlatforms() {
      let index = 0;
      while(true) {
        const p = platforms[index];
        // 保留光标 + 平台颜色
        elPlatform.className = `typing ${p.color}`;
        elPlatform.textContent = '';
        for(let c of p.name) { elPlatform.textContent += c; await wait(60); }
        await wait(p.delay);
        for(let i=0;i<p.name.length;i++){ elPlatform.textContent = elPlatform.textContent.slice(0,-1); await wait(DEL_SPEED); }
        index = (index+1)%3;
        await wait(600);
      }
    }

    (async function init(){
      await wait(800);
      await typeOnce(elName, nameLine);
      await wait(400);
      await typeOnce(elFollow, followPrefix);
      cyclePlatforms();
    })();
</script>

</body>
</html>
